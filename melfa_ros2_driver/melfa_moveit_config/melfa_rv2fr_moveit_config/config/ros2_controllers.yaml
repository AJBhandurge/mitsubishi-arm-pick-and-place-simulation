# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 286  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - rv2fr_joint_1
      - rv2fr_joint_2
      - rv2fr_joint_3
      - rv2fr_joint_4
      - rv2fr_joint_5
      - rv2fr_joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
gripper_controller:
  ros__parameters:
    joints:
      - finger_joint_l
      - finger_joint_r
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity